services:
  app:
    build: .
    ports: ["8080:8080", "8081:8081"]
    env_file: .env
    depends_on: [postgres, redis]
  postgres:
    image: postgres:16-alpine
    environment: {POSTGRES_DB: zclone, POSTGRES_USER: zclone, POSTGRES_PASSWORD: zclone}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes: {pgdata: {}}
