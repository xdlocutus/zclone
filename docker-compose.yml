services:
  app:
    build: .
    ports: ["8080:8080", "8081:8081"]
    env_file: .env
    depends_on: [mysql, redis]
  mysql:
    image: mysql:8.4
    environment: {MYSQL_DATABASE: zclone, MYSQL_USER: zclone, MYSQL_PASSWORD: zclone, MYSQL_ROOT_PASSWORD: zclone_root}
    ports: ["3306:3306"]
    volumes: ["mysqldata:/var/lib/mysql"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes: {mysqldata: {}}
