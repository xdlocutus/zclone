server { listen 8080; root /var/www/html/public; index index.php; add_header X-Frame-Options DENY; add_header X-Content-Type-Options nosniff; location / { try_files $uri /index.php?$query_string; } location /ws { proxy_pass http://127.0.0.1:8081; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "Upgrade"; } location ~ \.php$ { include fastcgi_params; fastcgi_pass 127.0.0.1:9000; fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name; } location ~ /\.(env|git) { deny all; } }
